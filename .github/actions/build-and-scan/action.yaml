---
name: 'Build and Scan docker image'
description: 'Builds and scans docker image'
inputs:
  labels:
    required: false
    default: '[]'
    description: Set of image labels
  tags:
    required: true
    description: Set of image tags
runs:
  using: "composite"
  steps:
    - name: Declare some variables
      id: vars
      shell: bash
      run: |
        echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Build
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
      with:
        context: ./docker
        push: false
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
        load: true

    - name: Anchore Scanner
      uses: anchore/scan-action@v7
      if: always()
      id: grype-scan
      with:
        image: oryd/k8s-toolbox:sha-${{ steps.vars.outputs.sha_short }}
        fail-build: true
        severity-cutoff: high
        only-fixed: true

    - name: Inspect action SARIF report
      shell: bash
      if: always()
      run: |
        echo "::group::Anchore Scan Details"
        jq '.runs[0].results' ${{ steps.grype-scan.outputs.sarif }}
        echo "::endgroup::"

    - name: Dockle Linter
      uses: erzz/dockle-action@v1.4.0
      if: always()
      with:
        image: oryd/k8s-toolbox:sha-${{ steps.vars.outputs.sha_short }}
        exit-code: 42
        failure-threshold: fatal
